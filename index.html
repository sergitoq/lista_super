function keyItem(t,d){return 'chk_'+t+'_'+d;}
function keyPrecio(t,d,prov){return 'precio_'+t+'_'+d+'_'+prov;}

function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function lsRemove(k){try{localStorage.removeItem(k);}catch(e){}}

function exportarJSON(){
let exp={};
Object.keys(lista).forEach(t=>{
exp[t]=lista[t].map(it=>{
let p=it.p.map((v,i)=>{let lv=lsGet(keyPrecio(t,it.d_orig,i));return lv!==null?parseFloat(parseFloat(lv).toFixed(2)):v;});
let cv=lsGet(keyCant(t,it.d_orig));let c=cv!==null?parseFloat(cv):it.c;
let dv=lsGet(keyDesc(t,it.d_orig));let d=dv!==null?dv:it.d;
return {d:d,d_orig:it.d_orig,c:c,p:p,comprado:lsGet(keyItem(t,it.d_orig))=='1'};
});
});
let txt=JSON.stringify(exp,null,2);
let blob=new Blob([txt],{type:'application/json'});
let a=document.createElement('a');a.href=URL.createObjectURL(blob);
a.download='precios_super.json';a.click();
}

function cargarTitulos(){
let s=document.getElementById('titulos');
let actual=s.value;
s.innerHTML='';
let oTodos=document.createElement('option');oTodos.value='**TODOS**';oTodos.textContent='Todos';s.appendChild(oTodos);
Object.keys(lista).forEach(t=>{
let pendientes=0;let total=0;
lista[t].forEach(it=>{
if(it.d_orig=='-')return;
if(it.c==0)return;
total++;
let k=keyItem(t,it.d_orig);
let checked=(lsGet(k)=='1');
if(!checked)pendientes++;
});
let todos=(pendientes==0);
if(verChecked || !todos){
let o=document.createElement('option');o.value=t;
o.textContent=todos?t:t+' ('+pendientes+')';
if(todos)o.style.opacity='0.35';
s.appendChild(o);
}
});
if(actual){
let found=Array.from(s.options).some(o=>o.value===actual);
if(found)s.value=actual;
}
mostrar();
}
function fmt(n){
let neg=n<0;let v=Math.abs(Number(n)||0).toFixed(2);
let p=v.split('.');
p[0]=p[0].replace(/\B(?=(\d{3})+(?!\d))/g,'.');
return (neg?'-':'')+p[0]+','+p[1];
}
function getPrecio(t,it,prov){
let k=keyPrecio(t,it.d_orig,prov);
let stored=lsGet(k);
return stored!==null?parseFloat(stored):(it.p[prov]||0);
}
function getCant(t,it){
let stored=lsGet(keyCant(t,it.d_orig));
return stored!==null?parseFloat(stored):it.c;
}
function getDesc(t,it){
let stored=lsGet(keyDesc(t,it.d_orig));
return stored!==null?stored:it.d;
}
function selectAll(el){
if(window.getSelection&&document.createRange){
let r=document.createRange();r.selectNodeContents(el);
let s=window.getSelection();s.removeAllRanges();s.addRange(r);
}else{document.execCommand('selectAll',false,null);}
}
function mostrar(){
let _sy=window.scrollY||window.pageYOffset||0;
totalPendiente=0;
let sel=document.getElementById('titulos').value;
let prov=parseInt(document.getElementById('proveedor').value);
let tabla=document.getElementById('tabla');tabla.innerHTML='';
function fila(t,it){
if(it.d_orig=='--'){
let tr=document.createElement('tr');
let td1=document.createElement('td');td1.textContent='';
let td2=document.createElement('td');td2.textContent='';
let td3=document.createElement('td');td3.textContent='';
let td5=document.createElement('td');td5.className='chk';
let ch=document.createElement('input');ch.type='checkbox';
let k=keyItem(t,it.d_orig);
let stored=lsGet(k);
let isChecked=(stored===null || stored=='1');
if(!verChecked && isChecked)return;
ch.checked=isChecked;
ch.onchange=function(){
if(ch.checked){lsSet(k,'1');}else{lsSet(k,'0');}
mostrar();
};
td5.appendChild(ch);
tr.appendChild(td1);tr.appendChild(td2);tr.appendChild(td3);tr.appendChild(td5);
if(isChecked)tr.classList.add('faded');
tabla.appendChild(tr);
return;
}
let pu=getPrecio(t,it,prov);
let cu=getCant(t,it);
let du=getDesc(t,it);
let k=keyItem(t,it.d_orig);
let stored=lsGet(k);
let isChecked=(getCant(t,it)==0 && stored===null)?true:(stored=='1');
if(!verChecked && isChecked)return;
if(!isChecked && cu>0){totalPendiente+=(cu*pu);}
let tr=document.createElement('tr');
if(isChecked)tr.classList.add('faded');
let td1=document.createElement('td');
td1.textContent=du;
td1.contentEditable=editMode?'true':'false';
td1.style.cursor=editMode?'text':'default';
td1.title=editMode?'':'Activar Nombres para editar';
if(editMode){
td1.onfocus=function(){setTimeout(()=>{selectAll(td1);},0);};
td1.onkeydown=function(e){if(e.key==='Enter'){e.preventDefault();td1.blur();}};
td1.onblur=function(){
let v=td1.textContent.trim();
if(v===''){td1.textContent=du;return;}
it.d=v;
lsSet(keyDesc(t,it.d_orig),v);
mostrar();
};
}
let td2=document.createElement('td');td2.textContent=cu;td2.className='qty';td2.contentEditable=true;td2.inputMode='decimal';
td2.onfocus=function(){td2.classList.add('editando');setTimeout(()=>{selectAll(td2);},0);};
td2.onkeydown=function(e){if(e.key==='Enter'){e.preventDefault();td2.blur();}};
td2.onblur=function(){td2.classList.remove('editando');
let v=parseFloat(td2.textContent.replace(',','.'))||0;
v=Math.round(v*100)/100;it.c=v;
lsSet(keyCant(t,it.d_orig),v);
td2.textContent=v;
mostrar();
};
let td3=document.createElement('td');td3.textContent=fmt(pu);td3.className='precio';td3.contentEditable=true;td3.inputMode='decimal';
td3.onfocus=function(){td3.classList.add('editando');setTimeout(()=>{selectAll(td3);},0);};
td3.onkeydown=function(e){if(e.key==='Enter'){e.preventDefault();td3.blur();}};
td3.onblur=function(){td3.classList.remove('editando');
let v=parseFloat(td3.textContent.replace(/\./g,'').replace(',','.'))||0;
v=parseFloat(v.toFixed(2));
it.p[prov]=v;
lsSet(keyPrecio(t,it.d_orig,prov),v);
td3.textContent=fmt(v);
mostrar();
};
let td5=document.createElement('td');td5.className='chk';
let ch=document.createElement('input');ch.type='checkbox';ch.checked=isChecked;
ch.onchange=function(){
if(ch.checked){tr.classList.add('faded');lsSet(k,'1');}
else{tr.classList.remove('faded');lsRemove(k);}
mostrar();
};
td5.appendChild(ch);
tr.appendChild(td1);tr.appendChild(td2);tr.appendChild(td3);tr.appendChild(td5);
tabla.appendChild(tr);
}
if(sel=='**TODOS**'){
Object.keys(lista).forEach(t=>{
let visibles=false;
let subtotalCat=0;
lista[t].forEach(it=>{
if(it.d_orig=='-'){visibles=true;return;}
let k=keyItem(t,it.d_orig);
let stored=lsGet(k);
let checked=(it.c==0 && stored===null)?true:(stored=='1');
if(verChecked || !checked){if(it.c>0 || verChecked) visibles=true;}
let cu=getCant(t,it);
if(!checked && cu>0){subtotalCat+=cu*getPrecio(t,it,prov);}
});
if(!visibles) return;
let trt=document.createElement('tr');trt.className='titulo';
let tdt=document.createElement('td');tdt.colSpan=4;
tdt.innerHTML=t+(subtotalCat>0?'<span class="subtitulo-total">$'+fmt(subtotalCat)+'</span>':'');
trt.appendChild(tdt);tabla.appendChild(trt);
lista[t].forEach(it=>fila(t,it));
});
}else{
let t=sel;lista[t].forEach(it=>fila(t,it));
}
document.getElementById('totalPendiente').textContent='Total: $'+fmt(totalPendiente);
requestAnimationFrame(function(){window.scrollTo(0,_sy);});
}
window.onload=function(){
if(lsGet('htmlVersion')!==htmlVersion){lsClear();lsSet('htmlVersion',htmlVersion);}
cargarTitulos();
};
</script></body></html>
